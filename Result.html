
<!DOCTYPE html>
<html>
<head>
    <title>{{ lang_content['title'] }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f9f9f9;
            padding: 20px;
        }
        h1, h2 {
            color: #2c3e50;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            font-size: 18px;
            margin: 5px 0;
        }
        a {
            text-decoration: none;
            color: #3498db;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Recommended Crops Section -->
    <h1>{{ lang_content['title'] }}</h1>
    <h2>Recommended Crops:</h2>
    <ul>
        {% for crop in crops %}
        <li>{{ crop }}</li>
        {% endfor %}
    </ul>

    <!-- Recommended Fertilizers Section -->
    <h2>{{ lang_content['fertilizer_label'] }}</h2>
    <ul>
        {% for fertilizer in fertilizers %}
        <li>{{ fertilizer }}</li>
        {% endfor %}
    </ul>

    <!-- Navigation Link -->
    <a href="/">Go Back</a>
</body>
</html>
