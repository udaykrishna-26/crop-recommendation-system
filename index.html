
<!DOCTYPE html>
<html>
<head>
    <title>{{ lang_content['title'] }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
        }
        label {
            font-weight: bold;
        }
        select {
            padding: 5px;
            margin: 10px 0;
        }
        button {
            background: #27ae60;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        button:hover {
            background: #219653;
        }
    </style>
</head>
<body>
    <h1>🌱 {{ lang_content['title'] }} 🚜</h1>

    <!-- Language Selection Form -->
    <form action="/" method="get">
        <label>Select Language:</label>
        <select name="lang">
            <option value="english">English</option>
            <option value="hindi">Hindi</option>
            <option value="telugu">Telugu</option>
        </select>
        <button type="submit">Change Language</button>
    </form>

    <br><br>

    <!-- Crop Recommendation Form -->
    <form action="/recommend" method="post">
        <input type="hidden" name="lang" value="{{ request.args.get('lang', 'english') }}">

        <label>{{ lang_content['soil_type'] }}</label>
        <select name="soil_type">
            {% for key, value in lang_content['soil_options'].items() %}
            <option value="{{ key }}">{{ value }}</option>
            {% endfor %}
        </select>
        <br><br>

        <label>{{ lang_content['weather'] }}</label>
        <select name="weather">
            {% for key, value in lang_content['weather_options'].items() %}
            <option value="{{ key }}">{{ value }}</option>
            {% endfor %}
        </select>
        <br><br>

        <label>{{ lang_content['market_demand'] }}</label>
        <select name="demand">
            {% for key, value in lang_content['demand_options'].items() %}
            <option value="{{ key }}">{{ value }}</option>
            {% endfor %}
        </select>
        <br><br>

        <button type="submit">🌾 {{ lang_content['recommendation_button'] }}</button>
    </form>
</body>
</html>
